<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFN Pterodactyl — Command Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg: #06060f;
  --bg-panel: #0b0b18;
  --bg-input: #0f0f1e;
  --surface: rgba(255,255,255,0.03);
  --surface2: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.07);
  --accent: #7c6fff;
  --accent-glow: rgba(124,111,255,0.3);
  --accent2: #a78bfa;
  --accent3: #38bdf8;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --text: #f8fafc;
  --text-dim: #94a3b8;
  --font-sans: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-lg: 20px;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg); color: var(--text); font-family: var(--font-mono);
  width: 100vw; height: 100vh; overflow: hidden; display: flex; position: relative;
}

/* Background Animation */
.bg-animation {
  position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 0; overflow: hidden; pointer-events: none;
}
.particle {
  position: absolute; background: linear-gradient(180deg, var(--accent) 0%, transparent 100%);
  border-radius: 50%; opacity: 0; animation: rainDrop linear infinite;
}
@keyframes rainDrop {
  0% { transform: translateY(-50px) scaleY(1); opacity: 0; }
  10% { opacity: 0.6; }
  80% { opacity: 0.6; transform: translateY(80vh) scaleY(2); }
  100% { transform: translateY(100vh) scaleY(1); opacity: 0; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

h1, h2, h3, h4 { font-family: var(--font-sans); }
.no-wrap { white-space: nowrap; flex-shrink: 0; }
.text-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* === Premium Buttons & Inputs === */
input, select, textarea {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px; border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 13px; transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow);
}

.btn {
  padding: 10px 20px; border: none; border-radius: var(--radius-sm);
  font-family: var(--font-sans); font-weight: 600; font-size: 14px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  white-space: nowrap; flex-shrink: 0;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative; overflow: hidden;
}
.btn:active { transform: scale(0.92); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 15px var(--accent-glow); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); filter: brightness(1.1); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: var(--danger); color: #fff; transform: translateY(-2px); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface-hover); border-color: var(--text-dim); }
.btn-icon { width: 38px; height: 38px; padding: 0; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.btn-icon:hover { background: var(--surface-hover); transform: rotate(5deg) scale(1.05); }
.btn-sm { padding: 8px 14px; font-size: 13px; }

/* === Layout: Sidebar + Main === */
#authScreen, #appLayout { display: none; width: 100%; height: 100%; z-index: 1; }
#authScreen.active, #appLayout.active { display: flex; }

/* Sidebar */
.sidebar {
  width: 260px; background: var(--bg-panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100;
}
.sidebar-header {
  height: 75px; padding: 0 20px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.brand-icon {
  width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent3));
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  box-shadow: 0 0 20px var(--accent-glow);
}
.brand-text { font-family: var(--font-sans); font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }

.sidebar-menu { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 4px; }
.menu-item {
  width: 100%; text-align: left; background: transparent; border: none;
  padding: 12px 15px; border-radius: var(--radius-sm); color: var(--text-dim);
  font-family: var(--font-sans); font-weight: 600; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 12px; transition: all 0.2s;
}
.menu-item i { width: 20px; text-align: center; font-size: 16px; transition: transform 0.2s; }
.menu-item:hover { color: var(--text); background: var(--surface); padding-left: 20px; }
.menu-item.active { background: var(--surface2); color: var(--accent3); border-left: 3px solid var(--accent); padding-left: 17px; }
.menu-item.active i { transform: scale(1.1); color: var(--accent3); }

/* Main Content */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.topbar {
  height: 75px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 30px; flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 15px; }
.page-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.parent-badge { display:none; background: rgba(245,158,11,0.1); color: var(--warning); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(245,158,11,0.2); cursor: pointer; transition: 0.2s; }
.parent-badge:hover { background: rgba(245,158,11,0.2); }
.topbar-actions { display: flex; gap: 10px; }

/* The fix for scroll: flex: 1 and overflow-y: auto */
.content-scroll { flex: 1; overflow-y: auto; padding: 30px; }

/* Data Grid & Cards */
.data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding-bottom: 50px; }
.data-card {
  background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; display: flex; flex-direction: column; gap: 15px;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  animation: cardIn 0.5s backwards;
}
.data-card:hover { transform: translateY(-4px) scale(1.01); border-color: rgba(124,111,255,0.4); box-shadow: 0 12px 25px rgba(0,0,0,0.3); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--text); width: 100%; display: flex; align-items: center; gap: 8px; }
.card-body { flex: 1; display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--text-dim); }
.info-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; background: var(--surface); padding: 8px 12px; border-radius: 6px; }
.info-row strong { color: var(--text); font-weight: 500; }
.info-val { display: inline-block; max-width: 180px; text-align: right; }
.card-footer { display: flex; justify-content: flex-end; gap: 8px; padding-top: 10px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
.badge-active { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
.badge-inactive { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

/* Modals */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal { background: var(--bg-panel); width: 100%; max-width: 550px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: flex; flex-direction: column; max-height: 90vh; transform: scale(0.95) translateY(20px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
.modal-overlay.active .modal { transform: scale(1) translateY(0); }
.modal-header { padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.modal-header h3 { font-size: 18px; }
.modal-body { padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
.modal-footer { padding: 20px 25px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--bg); border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); flex-shrink: 0; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 12px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* Grid Forms */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-grid.full { grid-template-columns: 1fr; }

/* Toast */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast { background: var(--bg-panel); border: 1px solid var(--border); padding: 14px 20px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: var(--font-sans); font-weight: 600; font-size: 14px; animation: slideIn .4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; max-width: 350px; }
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--danger); }
@keyframes slideIn { from { transform: translateX(100%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }

/* Empty State / Loader */
.empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 15px; }
.empty-state i { font-size: 40px; color: var(--border); }
.spinner { animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* Auth Screen Details */
.auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
.bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
.auth-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: var(--radius-lg); width: 100%; max-width: 400px; z-index: 1; box-shadow: 0 20px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 20px; animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
.auth-header { text-align: center; margin-bottom: 10px; }
.auth-icon { font-size: 46px; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--accent-glow)); }

@media(max-width: 768px) {
  .sidebar { position: absolute; left: -260px; height: 100%; }
  .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
  .topbar { padding: 0 15px; }
  .content-scroll { padding: 15px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Animated Background Particles -->
<div class="bg-animation" id="bgAnimation"></div>

<div class="toast-container" id="toastContainer"></div>

<!-- AUTH SCREEN -->
<div id="authScreen" class="active">
  <div class="auth-wrapper">
    <div class="bg-glow"></div>
    <div class="auth-box">
      <div class="auth-header">
        <i class="fa-solid fa-bolt auth-icon"></i>
        <h2>Connect to Panel</h2>
        <p style="color:var(--text-dim); font-size:13px;">Login using Application API</p>
      </div>
      <div class="form-group">
        <label>Panel URL</label>
        <input type="url" id="panelDomain" placeholder="https://panel.yourdomain.com">
      </div>
      <div class="form-group">
        <label>Application API Key</label>
        <input type="password" id="apiKey" placeholder="ptla_xxxxxxxxxxxxxxxx">
      </div>
      <button class="btn btn-primary" id="loginBtn" style="margin-top: 10px; height: 44px;">
        <i class="fa-solid fa-right-to-bracket"></i> Connect Panel
      </button>
    </div>
  </div>
</div>

<!-- APP LAYOUT (Sidebar + Main) -->
<div id="appLayout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon"><i class="fa-solid fa-server"></i></div>
      <div class="brand-text">RFN Pterodactyl</div>
    </div>
    <div class="sidebar-menu" id="sidebarMenu">
      <!-- Menu digenerate via JS -->
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h2 class="page-title" id="pageTitle"><i class="fa-solid fa-users"></i> Manajemen Users</h2>
        <div class="parent-badge" id="parentBadge" title="Klik untuk mengubah">Parent ID: -</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" id="btnCreate"><i class="fa-solid fa-plus"></i> Tambah Baru</button>
        <button class="btn-icon" id="btnRefresh" title="Refresh"><i class="fa-solid fa-rotate-right"></i></button>
        <button class="btn-icon" id="btnLogout" title="Logout" style="color:var(--danger); border-color:rgba(239,68,68,0.3);"><i class="fa-solid fa-power-off"></i></button>
      </div>
    </div>

    <div class="content-scroll">
      <div id="dataContainer" class="data-grid">
        <!-- Data dimuat di sini -->
      </div>
    </div>
  </div>
</div>

<!-- GLOBAL MODAL (Create/Edit) Form Based -->
<div class="modal-overlay" id="globalModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Title</h3>
      <button class="btn-icon" id="closeModalIcon" style="border:none; background:transparent;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Form Input Kolom dimuat disini -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="closeModalBtn">Batal</button>
      <button class="btn btn-primary" id="submitModalBtn">Simpan Perubahan</button>
    </div>
  </div>
</div>

<!-- PARENT ID PROMPT MODAL -->
<div class="modal-overlay" id="promptModal">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-header">
      <h3 id="promptTitle">Input Dibutuhkan</h3>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label id="promptLabel">Masukkan ID</label>
        <input type="number" id="promptInput" placeholder="Contoh: 1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="$('promptModal').classList.remove('active')">Batal</button>
      <button class="btn btn-primary" id="promptSubmitBtn">Lanjutkan</button>
    </div>
  </div>
</div>

<script>
// --- BACKGROUND ANIMATION ---
function initParticles() {
  const container = document.getElementById('bgAnimation');
  container.innerHTML = '';
  const numParticles = 40;
  for(let i=0; i<numParticles; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1; // 1px to 4px
    p.style.width = `${size}px`;
    p.style.height = `${size * 8}px`; // strech like rain
    p.style.left = `${Math.random() * 100}vw`;
    p.style.animationDuration = `${Math.random() * 2 + 2}s`; // 2s to 4s
    p.style.animationDelay = `${Math.random() * 5}s`;
    container.appendChild(p);
  }
}
initParticles();

const $ = id => document.getElementById(id);

// --- KONFIGURASI MENU ---
const menus = {
  users: { title: 'Users', icon: 'fa-users', endpoint: '/api/application/users' },
  servers: { title: 'Servers', icon: 'fa-server', endpoint: '/api/application/servers' },
  allocations: { title: 'Allocations', icon: 'fa-network-wired', endpoint: '/api/application/nodes/{parent}/allocations', requiresParent: 'Node ID' },
  db_hosts: { title: 'Database Hosts', icon: 'fa-database', endpoint: '/api/application/database-hosts' },
  eggs: { title: 'Eggs', icon: 'fa-egg', endpoint: '/api/application/nests/{parent}/eggs', requiresParent: 'Nest ID' },
  locations: { title: 'Locations', icon: 'fa-globe', endpoint: '/api/application/locations' },
  nests: { title: 'Nests', icon: 'fa-box-open', endpoint: '/api/application/nests' },
  nodes: { title: 'Nodes', icon: 'fa-sitemap', endpoint: '/api/application/nodes' },
  server_dbs: { title: 'Server Databases', icon: 'fa-database', endpoint: '/api/application/servers/{parent}/databases', requiresParent: 'Server ID' }
};

let currentMenu = 'users';
let parentIds = { nodes: '', nests: '', servers: '' };
let usersCache = {}; // Untuk mendeteksi Username Owner dari ID Server

// --- UTILITIES ---
function showToast(msg, type='success') {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':'fa-circle-exclamation'}"></i> <span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.transform = 'translateX(120%)'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function getCreds() { return { url: localStorage.getItem('rfn_url'), key: localStorage.getItem('rfn_key') }; }

// --- API FETCHING ---
async function apiReq(path, method = 'GET', body = null) {
  const creds = getCreds();
  if (!creds.url || !creds.key) throw new Error("Kredensial tidak valid");
  let baseUrl = creds.url.endsWith('/') ? creds.url.slice(0, -1) : creds.url;
  
  const options = { method, headers: { 'Accept': 'application/json', 'Content-Type': 'application/json', 'Authorization': `Bearer ${creds.key}` } };
  if (body) options.body = JSON.stringify(body);

  const res = await fetch(`${baseUrl}${path}`, options);
  if (res.status === 204) return true;
  
  const data = await res.json();
  if (!res.ok) throw new Error(data.errors ? data.errors.map(e => e.detail).join(', ') : 'API Error');
  return data;
}

// Prefetch users for Owner mapping
async function fetchUsersCache() {
  try {
    const res = await apiReq('/api/application/users?per_page=200');
    if (res.data) res.data.forEach(u => usersCache[u.attributes.id] = u.attributes.username);
  } catch (e) { console.error("Gagal cache users"); }
}

// --- RENDER SIDEBAR ---
function initSidebar() {
  const sb = $('sidebarMenu');
  sb.innerHTML = '';
  for (const [key, menu] of Object.entries(menus)) {
    const btn = document.createElement('button');
    btn.className = `menu-item ${key === currentMenu ? 'active' : ''}`;
    btn.innerHTML = `<i class="fa-solid ${menu.icon}"></i> ${menu.title}`;
    btn.onclick = () => switchMenu(key);
    sb.appendChild(btn);
  }
}

// --- SWITCH MENU & PARENT LOGIC ---
async function switchMenu(key) {
  const menu = menus[key];
  if (menu.requiresParent) {
    const parentType = menu.requiresParent.split(' ')[0].toLowerCase() + 's';
    if (!parentIds[parentType]) return askForParentId(key, menu.requiresParent, parentType);
  }
  currentMenu = key; initSidebar();
  
  $('pageTitle').innerHTML = `<i class="fa-solid ${menu.icon}"></i> Manajemen ${menu.title}`;
  if (menu.requiresParent) {
    const pType = menu.requiresParent.split(' ')[0].toLowerCase() + 's';
    $('parentBadge').style.display = 'inline-block';
    $('parentBadge').innerText = `${menu.requiresParent}: ${parentIds[pType]}`;
    $('parentBadge').onclick = () => askForParentId(key, menu.requiresParent, pType);
  } else {
    $('parentBadge').style.display = 'none';
  }
  loadData();
}

function askForParentId(menuKey, label, typeKey) {
  $('promptTitle').innerText = `Butuh ${label}`;
  $('promptLabel').innerText = `Masukkan ${label} untuk melihat data`;
  $('promptInput').value = parentIds[typeKey] || '';
  $('promptModal').classList.add('active');
  $('promptInput').focus(); // Otomatis fokus agar mudah menekan enter
  
  $('promptSubmitBtn').onclick = () => {
    const val = $('promptInput').value.trim();
    if (!val) return showToast('ID tidak boleh kosong', 'error');
    parentIds[typeKey] = val;
    $('promptModal').classList.remove('active');
    switchMenu(menuKey);
  };
}

function getRealEndpoint(menuKey, itemId = '') {
  let ep = menus[menuKey].endpoint;
  if (menus[menuKey].requiresParent) {
    const pType = menus[menuKey].requiresParent.split(' ')[0].toLowerCase() + 's';
    ep = ep.replace('{parent}', parentIds[pType]);
  }
  return ep + (itemId ? `/${itemId}` : '');
}

// --- LOAD DATA ---
async function loadData() {
  const container = $('dataContainer');
  const btn = $('btnRefresh');
  btn.classList.add('spinner');
  container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-circle-notch spinner"></i><p>Memuat data...</p></div>`;
  
  try {
    const endpoint = getRealEndpoint(currentMenu);
    const res = await apiReq(`${endpoint}?per_page=100`);
    const items = res.data || [];
    
    container.innerHTML = '';
    if (items.length === 0) {
      container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>Tidak ada data ditemukan.</p></div>`;
      return;
    }

    items.forEach((item, index) => {
      container.appendChild(createCard(item, currentMenu, index));
    });
  } catch (e) {
    container.innerHTML = `<div class="empty-state" style="color:var(--danger)"><i class="fa-solid fa-triangle-exclamation"></i><p>${e.message}</p></div>`;
    showToast(e.message, 'error');
  } finally {
    btn.classList.remove('spinner');
  }
}

// --- RENDER CARDS ---
function createCard(item, menuKey, index) {
  const attr = item.attributes;
  const div = document.createElement('div');
  div.className = 'data-card';
  div.style.animationDelay = `${index * 0.05}s`;
  
  let headerHtml = '';
  let bodyHtml = '';

  if (menuKey === 'servers') {
    // DETAIL SERVER YANG LEBIH LENGKAP
    const ownerName = usersCache[attr.user] || `ID: ${attr.user}`;
    const ownerDisplay = attr.user === 1 ? `<span style="color:var(--warning); font-weight:bold;">OWNER</span> (${ownerName})` : ownerName;
    
    const dateObj = attr.created_at ? new Date(attr.created_at) : new Date();
    const formattedDate = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    const isSuspended = attr.suspended;

    headerHtml = `
      <div class="card-title text-truncate" title="${attr.name}"><i class="fa-solid fa-server"></i> ${attr.name}</div>
      <span class="badge ${isSuspended ? 'badge-inactive' : 'badge-active'}">${isSuspended ? 'Suspended' : 'Active'}</span>
    `;
    bodyHtml = `
      <div class="info-row"><strong>Owner:</strong> <span class="info-val text-truncate" title="${ownerName}"><i class="fa-solid fa-user" style="font-size:10px;"></i> ${ownerDisplay}</span></div>
      <div class="info-row"><strong>Dibuat Pada:</strong> <span class="info-val">${formattedDate}</span></div>
      <div class="info-row"><strong>Node ID:</strong> <span class="info-val">${attr.node}</span></div>
      <div class="info-row"><strong>Memory / Disk:</strong> <span class="info-val">${attr.limits.memory} MB / ${attr.limits.disk} MB</span></div>
    `;
  } else if (menuKey === 'users') {
    // DETAIL USER
    let roleBadge = `<span class="badge ${attr.root_admin ? 'badge-active' : 'badge-inactive'}" style="${attr.root_admin ? '':'color:var(--text-dim);border-color:var(--border);'}">${attr.root_admin ? 'Admin' : 'User'}</span>`;
    if (attr.id === 1) {
      roleBadge = `<span class="badge" style="background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2);">OWNER</span>`;
    }

    headerHtml = `
      <div class="card-title text-truncate" title="${attr.username}"><i class="fa-solid fa-user"></i> ${attr.username}</div>
      ${roleBadge}
    `;
    bodyHtml = `
      <div class="info-row"><strong>ID:</strong> <span class="info-val">${attr.id}</span></div>
      <div class="info-row"><strong>Nama:</strong> <span class="info-val text-truncate">${attr.first_name} ${attr.last_name}</span></div>
      <div class="info-row"><strong>Email:</strong> <span class="info-val text-truncate">${attr.email}</span></div>
    `;
  } else {
    // GENERIC FALLBACK
    let title = attr.name || attr.username || attr.fqdn || attr.description || `ID: ${attr.id}`;
    headerHtml = `<div class="card-title text-truncate" title="${title}"><i class="fa-solid ${menus[menuKey].icon}"></i> ${title}</div>`;
    bodyHtml += `<div class="info-row"><strong>ID:</strong> <span class="info-val">${attr.id}</span></div>`;
    
    let sub1 = attr.uuid || attr.ip || attr.port || (attr.memory !== undefined ? `RAM: ${attr.memory}MB` : '') || '';
    if(sub1) bodyHtml += `<div class="info-row"><strong>Info Utama:</strong> <span class="info-val text-truncate">${sub1}</span></div>`;
  }

  div.innerHTML = `
    <div class="card-header">${headerHtml}</div>
    <div class="card-body">${bodyHtml}</div>
    <div class="card-footer">
      <button class="btn btn-sm btn-secondary" onclick="openFormModal('edit', ${attr.id})"><i class="fa-solid fa-pen"></i> Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteData(${attr.id})"><i class="fa-solid fa-trash"></i> Hapus</button>
    </div>
  `;
  return div;
}

// --- CRUD OPERATIONS ---
async function deleteData(id) {
  if(!confirm("Anda yakin ingin menghapus data ini secara permanen?")) return;
  try {
    const endpoint = getRealEndpoint(currentMenu, id);
    await apiReq(endpoint, 'DELETE');
    showToast("Berhasil dihapus!");
    loadData();
  } catch (e) { showToast(e.message, 'error'); }
}

// --- DYNAMIC FORM BUILDER (Bukan JSON Lagi) ---
let modalAction = ''; // 'create' or 'edit'
let editId = null;

function renderInput(id, label, value = '', type = 'text', placeholder = '', isFull = false) {
  return `
    <div class="form-group ${isFull ? 'full' : ''}">
      <label>${label}</label>
      <input type="${type}" id="inp_${id}" value="${value}" placeholder="${placeholder}">
    </div>
  `;
}

function buildFormHtml(menuKey, action, data = {}) {
  let html = `<div class="form-grid">`;
  
  if (menuKey === 'users') {
    html += renderInput('email', 'Alamat Email', data.email||'', 'email', 'user@domain.com');
    html += renderInput('username', 'Username', data.username||'', 'text', 'username');
    html += renderInput('first_name', 'Nama Depan', data.first_name||'', 'text', 'John');
    html += renderInput('last_name', 'Nama Belakang', data.last_name||'', 'text', 'Doe');
    html += renderInput('password', 'Password', '', 'password', action === 'create' ? 'Wajib diisi' : 'Kosongkan jika tidak ingin diubah');
  } 
  else if (menuKey === 'servers') {
    html += renderInput('name', 'Nama Server', data.name||'', 'text', 'My Server', true);
    html += renderInput('user', 'Owner (User ID)', data.user||'', 'number', 'Contoh: 1');
    html += renderInput('node', 'Node ID', data.node||'', 'number', 'Contoh: 1');
    html += renderInput('allocation', 'Allocation ID', data.allocation||'', 'number');
    html += renderInput('egg', 'Egg ID', data.egg||'', 'number');
    html += renderInput('memory', 'Memory (MB)', data.limits?.memory ?? 1024, 'number');
    html += renderInput('disk', 'Disk (MB)', data.limits?.disk ?? 1024, 'number');
    html += renderInput('docker_image', 'Docker Image', data.docker_image||'ghcr.io/pterodactyl/yolks:java_17', 'text', '', true);
    html += renderInput('startup', 'Startup Command', data.startup||'java -jar server.jar', 'text', '', true);
  } 
  else {
    // Generate form generic berdasarkan property jika mode Edit, jika Create tampilkan notifikasi.
    if (action === 'create') {
      html += `<div style="grid-column: 1 / -1; color:var(--text-dim); text-align:center;">Mode pembuatan untuk modul <b>${menuKey}</b> butuh penyesuaian khusus. Coba gunakan panel asli untuk stabilitas tinggi.</div>`;
    } else {
      Object.keys(data).forEach(key => {
        if(typeof data[key] !== 'object' && key !== 'id' && key !== 'created_at' && key !== 'updated_at') {
          html += renderInput(key, key.replace('_', ' '), data[key]);
        }
      });
    }
  }
  
  html += `</div>`;
  return html;
}

// Collector: Mengambil inputan form HTML lalu dirubah menjadi JSON valid buat Pterodactyl API
function collectFormData(menuKey) {
  let body = {};
  if (menuKey === 'users') {
    body = {
      email: $('inp_email').value, username: $('inp_username').value,
      first_name: $('inp_first_name').value, last_name: $('inp_last_name').value
    };
    if ($('inp_password').value) body.password = $('inp_password').value;
  } 
  else if (menuKey === 'servers') {
    body = {
      name: $('inp_name').value,
      user: parseInt($('inp_user').value),
      node: parseInt($('inp_node').value),
      allocation: parseInt($('inp_allocation').value),
      egg: parseInt($('inp_egg').value),
      docker_image: $('inp_docker_image').value,
      startup: $('inp_startup').value,
      environment: { SERVER_JARFILE: "server.jar" }, // Standar environment default
      limits: {
        memory: parseInt($('inp_memory').value),
        swap: 0,
        disk: parseInt($('inp_disk').value),
        io: 500, cpu: 100
      },
      feature_limits: { databases: 0, backups: 0 }
    };
  } 
  else {
    // Untuk generic
    const inputs = document.querySelectorAll('#modalBody input');
    inputs.forEach(inp => {
      const key = inp.id.replace('inp_', '');
      const isNum = inp.type === 'number';
      body[key] = isNum ? parseFloat(inp.value) : inp.value;
    });
  }
  return body;
}

async function openFormModal(action, id = null) {
  modalAction = action; editId = id;
  const menuTitle = menus[currentMenu].title;
  
  $('modalTitle').innerHTML = action === 'create' ? `<i class="fa-solid fa-plus"></i> Tambah ${menuTitle}` : `<i class="fa-solid fa-pen"></i> Edit ${menuTitle}`;
  $('modalBody').innerHTML = `<div style="text-align:center; color:var(--text-dim);"><i class="fa-solid fa-circle-notch spinner"></i> Memuat form...</div>`;
  $('globalModal').classList.add('active');

  let data = {};
  if (action === 'edit') {
    try {
      const endpoint = getRealEndpoint(currentMenu, id);
      const res = await apiReq(endpoint);
      data = res.attributes || res.data.attributes;
    } catch(e) {
      return $('modalBody').innerHTML = `<p style="color:var(--danger)">Gagal mengambil data: ${e.message}</p>`;
    }
  }
  
  $('modalBody').innerHTML = buildFormHtml(currentMenu, action, data);
}

const closeModal = () => $('globalModal').classList.remove('active');
$('closeModalIcon').onclick = closeModal; $('closeModalBtn').onclick = closeModal;

$('submitModalBtn').onclick = async () => {
  const btn = $('submitModalBtn');
  btn.innerHTML = `<i class="fa-solid fa-circle-notch spinner"></i> Menyimpan...`;
  btn.disabled = true;

  try {
    const bodyPayload = collectFormData(currentMenu);
    const endpoint = getRealEndpoint(currentMenu, modalAction === 'edit' ? editId : '');
    const method = modalAction === 'create' ? 'POST' : 'PATCH';
    
    await apiReq(endpoint, method, bodyPayload);
    
    showToast(`Data berhasil ${modalAction === 'create' ? 'dibuat' : 'diperbarui'}!`);
    closeModal();
    loadData();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.innerHTML = `Simpan Perubahan`;
    btn.disabled = false;
  }
};

$('btnCreate').onclick = () => openFormModal('create');
$('btnRefresh').onclick = loadData;

// --- AUTH LOGIC ---
$('loginBtn').onclick = async () => {
  const url = $('panelDomain').value.trim();
  const key = $('apiKey').value.trim();
  if(!url || !key) return showToast('Isi URL dan API Key!', 'error');
  
  $('loginBtn').innerHTML = `<i class="fa-solid fa-circle-notch spinner"></i> Mengautentikasi...`;
  try {
    let baseUrl = url.endsWith('/') ? url.slice(0, -1) : url;
    const res = await fetch(`${baseUrl}/api/application/users`, { headers: { 'Accept': 'application/json', 'Authorization': `Bearer ${key}` } });
    if(!res.ok) throw new Error("Akses ditolak. Periksa URL dan Key.");
    
    localStorage.setItem('rfn_url', url); localStorage.setItem('rfn_key', key);
    showToast('Login berhasil!');
    
    $('authScreen').classList.remove('active');
    $('appLayout').classList.add('active');
    
    await fetchUsersCache(); // Load caching
    initSidebar();
    switchMenu('users');
  } catch(e) { showToast(e.message, 'error'); } 
  finally { $('loginBtn').innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Connect Panel`; }
};

$('btnLogout').onclick = () => {
  localStorage.removeItem('rfn_url'); localStorage.removeItem('rfn_key');
  $('appLayout').classList.remove('active'); $('authScreen').classList.add('active');
};

// --- ENTER KEY SUPPORT ---
$('panelDomain').addEventListener('keyup', (e) => { if(e.key === 'Enter') $('loginBtn').click(); });
$('apiKey').addEventListener('keyup', (e) => { if(e.key === 'Enter') $('loginBtn').click(); });
$('promptInput').addEventListener('keyup', (e) => { if(e.key === 'Enter') $('promptSubmitBtn').click(); });

// Dukungan tombol enter juga untuk form global (saat Edit/Create)
$('modalBody').addEventListener('keyup', (e) => {
  if(e.key === 'Enter' && e.target.tagName === 'INPUT') {
    $('submitModalBtn').click();
  }
});

// Auto Login
window.onload = () => {
  const c = getCreds();
  if(c.url && c.key) {
    $('panelDomain').value = c.url; $('apiKey').value = c.key;
    $('loginBtn').click();
  }
};
</script>
</body>
</html>
