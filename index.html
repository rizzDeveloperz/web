<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFN Pterodactyl</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">RFN Pterodactyl</h1>

        <div id="loginSection" class="bg-gray-800 p-6 rounded-lg mb-8 shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Koneksi Panel</h2>
            <div class="flex gap-4">
                <input type="text" id="domain" placeholder="https://panel.example.com" class="w-1/2 p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-400">
                <input type="password" id="apiKey" placeholder="PLTA Key" class="w-1/2 p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-400">
                <button onclick="app.connect()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded font-bold transition">Masuk</button>
            </div>
            <p id="loginError" class="text-red-400 mt-2 text-sm hidden"></p>
        </div>

        <div id="dashboard" class="hidden space-y-8">
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Daftar Users</h2>
                    <button onclick="app.toggleModal('userModal')" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm font-bold">Buat User</button>
                </div>
                <div id="usersList" class="space-y-2"></div>
            </div>

            <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Daftar Servers</h2>
                    <button onclick="app.toggleModal('serverModal')" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm font-bold">Buat Server</button>
                </div>
                <div id="serversList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="userModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-lg w-96">
            <h2 class="text-xl font-bold mb-4">Buat User Baru</h2>
            <input type="email" id="uEmail" placeholder="Email" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="text" id="uUsername" placeholder="Username" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="text" id="uFirst" placeholder="First Name" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="text" id="uLast" placeholder="Last Name" class="w-full p-2 mb-4 rounded bg-gray-700 border border-gray-600">
            <div class="flex justify-end gap-2">
                <button onclick="app.toggleModal('userModal')" class="bg-gray-600 px-4 py-2 rounded">Batal</button>
                <button onclick="app.createUser()" class="bg-blue-600 px-4 py-2 rounded">Simpan</button>
            </div>
        </div>
    </div>

    <div id="serverModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-lg w-96">
            <h2 class="text-xl font-bold mb-4">Buat Server Baru</h2>
            <input type="text" id="sName" placeholder="Nama Server" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="sOwner" placeholder="User ID Pemilik" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="sNode" placeholder="Node ID" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="sAllocation" placeholder="Allocation ID" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="sMemory" value="4000" placeholder="RAM Limit (MB)" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="sDisk" placeholder="Disk Limit (MB)" class="w-full p-2 mb-4 rounded bg-gray-700 border border-gray-600">
            <div class="flex justify-end gap-2">
                <button onclick="app.toggleModal('serverModal')" class="bg-gray-600 px-4 py-2 rounded">Batal</button>
                <button onclick="app.createServer()" class="bg-blue-600 px-4 py-2 rounded">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            domain: '',
            apiKey: '',

            async fetchAPI(endpoint, method = 'GET', body = null) {
                const url = `${this.domain}/api/application/${endpoint}`;
                const options = {
                    method,
                    headers: {
                        'Authorization': `Bearer ${this.apiKey}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                };
                if (body) options.body = JSON.stringify(body);

                try {
                    const res = await fetch(url, options);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.errors?.[0]?.detail || 'Terjadi kesalahan');
                    return data;
                } catch (err) {
                    alert('Error: ' + err.message);
                    return null;
                }
            },

            async connect() {
                this.domain = document.getElementById('domain').value.replace(/\/$/, '');
                this.apiKey = document.getElementById('apiKey').value;

                if (!this.domain || !this.apiKey) return;

                const check = await this.fetchAPI('users');
                if (check) {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    this.loadUsers();
                    this.loadServers();
                } else {
                    const errEl = document.getElementById('loginError');
                    errEl.textContent = 'Gagal terhubung. Cek Domain, Key, atau CORS.';
                    errEl.classList.remove('hidden');
                }
            },

            async loadUsers() {
                const el = document.getElementById('usersList');
                el.innerHTML = 'Memuat...';
                const res = await this.fetchAPI('users');
                if (res && res.data) {
                    el.innerHTML = res.data.map(u => `
                        <div class="p-3 bg-gray-700 rounded flex justify-between items-center border border-gray-600">
                            <div>
                                <p class="font-bold">${u.attributes.username} (ID: ${u.attributes.id})</p>
                                <p class="text-xs text-gray-400">${u.attributes.email}</p>
                            </div>
                        </div>
                    `).join('');
                }
            },

            async loadServers() {
                const el = document.getElementById('serversList');
                el.innerHTML = 'Memuat...';
                const res = await this.fetchAPI('servers');
                if (res && res.data) {
                    el.innerHTML = res.data.map(s => `
                        <div class="p-3 bg-gray-700 rounded flex justify-between items-center border border-gray-600">
                            <div>
                                <p class="font-bold">${s.attributes.name} (ID: ${s.attributes.id})</p>
                                <p class="text-xs text-gray-400">Node: ${s.attributes.node} | RAM: ${s.attributes.limits.memory}MB</p>
                            </div>
                        </div>
                    `).join('');
                }
            },

            toggleModal(id) {
                const el = document.getElementById(id);
                el.classList.toggle('hidden');
            },

            async createUser() {
                const body = {
                    email: document.getElementById('uEmail').value,
                    username: document.getElementById('uUsername').value,
                    first_name: document.getElementById('uFirst').value,
                    last_name: document.getElementById('uLast').value
                };
                const res = await this.fetchAPI('users', 'POST', body);
                if (res) {
                    this.toggleModal('userModal');
                    this.loadUsers();
                }
            },

            async createServer() {
                const body = {
                    name: document.getElementById('sName').value,
                    user: parseInt(document.getElementById('sOwner').value),
                    node: parseInt(document.getElementById('sNode').value),
                    allocation: { default: parseInt(document.getElementById('sAllocation').value) },
                    limits: {
                        memory: parseInt(document.getElementById('sMemory').value),
                        swap: 0,
                        disk: parseInt(document.getElementById('sDisk').value),
                        io: 500,
                        cpu: 100
                    },
                    environment: {
                        SERVER_JARFILE: "server.jar" 
                    },
                    feature_limits: { databases: 0, backups: 0 },
                    egg: 1, 
                    docker_image: "ghcr.io/pterodactyl/yolks:java_17", 
                    startup: "java -Xms128M -Xmx{{SERVER_MEMORY}}M -jar {{SERVER_JARFILE}}" 
                };

                const res = await this.fetchAPI('servers', 'POST', body);
                if (res) {
                    this.toggleModal('serverModal');
                    this.loadServers();
                }
            }
        };
    </script>
</body>
</html>
